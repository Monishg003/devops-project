# Development compose file
services:

  postgres:
    image: postgres:15-alpine
    container_name: devops-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL",
        "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: devops-redis
    command: redis-server --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      target: runtime
    container_name: devops-app
    environment:
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      APP_PORT: ${APP_PORT}
      APP_ENV: ${APP_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
    networks:
      - frontend-net
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: devops-adminer
    ports:
      - "9998:8080"

    networks:
      - backend-net

    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: devops-nginx
    ports:
      - "${NGINX_PORT:-9999}:80"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
    networks:
      - frontend-net
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider",
             "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  frontend-net:
    driver: bridge
    name: devops-frontend
  backend-net:
    driver: bridge
    name: devops-backend
    internal: false

volumes:
  postgres-data:
    name: devops-postgres-data
  redis-data:
    name: devops-redis-data
